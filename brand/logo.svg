<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
  </defs>

  <!-- Dark canvas -->
  <rect width="500" height="120" fill="#0f1015" rx="16"/>

  <!-- Centered Wordmark -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Claude</tspan><tspan fill="url(#orangeGrad)">Craft</tspan>
  </text>
</svg>
