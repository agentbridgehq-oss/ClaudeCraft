# ClaudeCraft OpenClaw — egress allowlist
# This agent drafts content, summarizes sales data, and writes a daily report.
# It NEVER posts publicly, so it needs almost nothing reachable.
#
# Only these domains are reachable. Everything else is denied by default.

acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain api.stripe.com

http_access allow allowed_domains
http_access deny all

http_port 3128
