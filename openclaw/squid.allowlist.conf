# ClaudeCraft OpenClaw — egress allowlist
# This agent drafts content, summarizes sales data, writes a daily report,
# and auto-publishes two articles to ClaudeCraft's own Articles section.
# It NEVER posts to any third-party platform, so it needs almost nothing reachable.
#
# Only these domains are reachable. Everything else is denied by default.

acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain api.stripe.com
acl allowed_domains dstdomain claudecraft.ca
acl allowed_domains dstdomain claudecraft-production.up.railway.app

http_access allow allowed_domains
http_access deny all

http_port 3128
